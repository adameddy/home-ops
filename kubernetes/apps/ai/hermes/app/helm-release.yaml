---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      *app :
        initContainers:
          init:
            image:
              repository: docker.io/library/alpine
              tag: "3.23"
            command:
              - sh
              - -c
              - |
                set -euo pipefail
                mkdir -p /opt/data
                cp /tmp/config.yaml /opt/data/config.yaml
                chown 10000:10000 /opt/data/config.yaml

        containers:
          app:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4

            env:
              TZ: ${TIMEZONE}
              PORT: &port 8642
              HERMES_HOME: /opt/data
              HOME: /opt/data

            envFrom:
              - secretRef:
                  name: hermes-secrets

            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi

          dashboard:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4

            args:
              - dashboard
              - --host
              - "0.0.0.0"
              - --insecure

            env:
              TZ: ${TIMEZONE}
              GATEWAY_HEALTH_URL: http://localhost:8642

            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

            ports:
              - containerPort: 9119
                name: http
                protocol: TCP

    defaultPodOptions:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
      dashboard:
        controller: *app
        ports:
          http:
            port: 9119

    route:
      app:
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        hostnames: ["{{ .Release.Name }}.${DOMAIN}"]
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      config:
        type: configMap
        name: hermes-configmap
        defaultMode: 0755
        globalMounts:
          - path: /tmp/config.yaml
            subPath: config.yaml
